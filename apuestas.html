<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Apuestas | GolApuestas</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/diseno.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">GolApuestas</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="partidos.html">Partidos</a></li>
        <li><a href="equipo.html">Equipo</a></li>
        <li><a href="apuestas.html" class="activo">Apuestas</a></li>
      </ul>
    </nav>
  </header>
  <main class="pagina">
    <section class="contacto">
      <h2>Registrar apuesta</h2>
      <form class="formulario">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>
        <label for="partido">Partido</label>
        <select id="partido" required>
          <option value="">Selecciona</option>
          <option>Real Madrid vs Barcelona</option>
          <option>Manchester City vs Liverpool</option>
          <option>America vs Chivas</option>
        </select>
        <label for="monto">Monto (MXN)</label>
        <input type="number" id="monto" min="10" required>
        <button type="submit" class="btn btn-primary">Confirmar apuesta</button>
      </form>
    </section>
  </main>
</body>
</html>
